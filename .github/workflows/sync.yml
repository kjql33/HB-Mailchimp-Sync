name: HubSpot↔Mailchimp Bidirectional Sync (V2)

on:
  schedule:
    - cron: '0 */8 * * *'    # every 8 hours at minute 0 (00:00, 08:00, 16:00 UTC)
  workflow_dispatch:         # allows you to trigger manually from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hour timeout to prevent runaway jobs

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-v2.txt

      - name: Debug Environment
        run: |
          echo "corev2 module check:"
          python -c "import corev2; print('✅ corev2 import successful')"
          echo "Config validation:"
          python -m corev2.cli --help
      
      - name: Run HubSpot↔Mailchimp Sync V2 (corev2)
        run: |
          SYNC_START=$(date +%s)
          echo "🚀 Starting corev2 sync at $(date -u)"
          
          # Step 1: Generate plan (dry-run)
          echo "📋 Generating operations plan..."
          python -m corev2.cli plan \
            --config corev2/config/production.yaml \
            --output corev2/artifacts/plan_$(date +%Y%m%d_%H%M%S).json \
            2>&1 | tee /tmp/plan_output.log || {
              echo "❌ Plan generation failed"
              tail -n 20 /tmp/plan_output.log > /tmp/sync_error.log
              exit 1
            }
          
          # Find the latest plan file
          PLAN_FILE=$(ls -t corev2/artifacts/plan_*.json | head -1)
          echo "📄 Plan saved to: $PLAN_FILE"
          
          # Step 2: Apply plan (execute operations)
          echo "⚙️ Applying operations plan..."
          python -m corev2.cli apply \
            --plan "$PLAN_FILE" \
            2>&1 | tee /tmp/apply_output.log || {
              echo "❌ Apply failed"
              tail -n 20 /tmp/apply_output.log > /tmp/sync_error.log
              exit 1
            }
          
          SYNC_END=$(date +%s)
          DURATION=$((SYNC_END - SYNC_START))
          echo "✅ corev2 sync completed successfully in ${DURATION} seconds"
          
          # Copy logs to workspace for commit
          mkdir -p logs
          cp /tmp/plan_output.log logs/plan_$(date +%Y%m%d_%H%M%S).log || true
          cp /tmp/apply_output.log logs/apply_$(date +%Y%m%d_%H%M%S).log || true
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_AUDIENCE_ID }}
          MAILCHIMP_DC: ${{ secrets.MAILCHIMP_DC }}
          MAILCHIMP_TAG_DELAY: "0.05"      # Reduced from 1.0s to 0.05s (95% faster tag operations)  
          MAILCHIMP_UPSERT_DELAY: "0.05"   # New configurable delay after upserts (prevents rate limits)
      
      - name: Commit sync logs and artifacts
        if: ${{ success() }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add logs/*.log corev2/artifacts/*.json corev2/artifacts/*.jsonl || true
          git diff --staged --quiet || git commit -m "🤖 Sync logs: $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin ${{ github.ref_name }} || echo "⚠️ Push failed (may be no changes)"
      
      - name: Upload artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-${{ github.run_number }}
          path: |
            /tmp/*.log
            corev2/artifacts/*.json
          retention-days: 7

      - name: Notify Teams on failure
        if: ${{ failure() }}
        run: |
          ERROR_SNIPPET=""
          if [ -f /tmp/sync_error.log ]; then
            ERROR_SNIPPET=$(tail -n 5 /tmp/sync_error.log | head -c 500)
          elif [ -f /tmp/apply_output.log ]; then
            ERROR_SNIPPET=$(tail -n 5 /tmp/apply_output.log | head -c 500)
          elif [ -f /tmp/plan_output.log ]; then
            ERROR_SNIPPET=$(tail -n 5 /tmp/plan_output.log | head -c 500)
          fi
          
          # Escape JSON special characters
          ERROR_SNIPPET=$(echo "$ERROR_SNIPPET" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" | sed 's/^"//;s/"$//')
          
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ CRM Sync FAILED\\n\\nRun #${{ github.run_number }}\\nTriggered: ${{ github.event_name }}\\nLogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n\\nError:\\n${ERROR_SNIPPET}\"}" \
            "$TEAMS_WEBHOOK_URL" || echo "⚠️ Teams notification failed"
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}