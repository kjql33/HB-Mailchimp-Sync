name: HubSpot ↔ Mautic Bidirectional Sync

on:
  schedule:
    # Runs at 00:00, 08:00, 16:00 UTC every day
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (simulate only, no mutations)"
        required: false
        default: "false"
        type: boolean
      only_email:
        description: "Debug: sync only this email address"
        required: false
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  CONFIG_PATH: "corev2/config/production.yaml"

jobs:
  sync:
    name: Run Sync Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      # ── Setup ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Validate config ────────────────────────────────────────────
      - name: Validate config
        run: python -m corev2.cli validate-config --config ${{ env.CONFIG_PATH }}
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
          MAUTIC_BASE_URL: ${{ secrets.MAUTIC_BASE_URL }}
          MAUTIC_USERNAME: ${{ secrets.MAUTIC_USERNAME }}
          MAUTIC_PASSWORD: ${{ secrets.MAUTIC_PASSWORD }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEAMS_NOTIFICATIONS_ENABLED: ${{ secrets.TEAMS_NOTIFICATIONS_ENABLED }}

      # ── Generate plan ──────────────────────────────────────────────
      - name: Generate operations plan
        id: plan
        run: |
          PLAN_FILE="corev2/artifacts/plan_$(date +%Y%m%d_%H%M%S).json"
          echo "plan_file=$PLAN_FILE" >> $GITHUB_OUTPUT

          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.only_email }}" ]; then
            EXTRA_ARGS="--only-email ${{ github.event.inputs.only_email }}"
          fi

          # --skip-health-check: Docker not accessible from GitHub Actions runner
          # The health check and permission fix only works on the Ubuntu server directly
          python -m corev2.cli plan \
            --config ${{ env.CONFIG_PATH }} \
            --output "$PLAN_FILE" \
            --skip-health-check \
            $EXTRA_ARGS \
            2>&1 | tee /tmp/plan.log
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
          MAUTIC_BASE_URL: ${{ secrets.MAUTIC_BASE_URL }}
          MAUTIC_USERNAME: ${{ secrets.MAUTIC_USERNAME }}
          MAUTIC_PASSWORD: ${{ secrets.MAUTIC_PASSWORD }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEAMS_NOTIFICATIONS_ENABLED: ${{ secrets.TEAMS_NOTIFICATIONS_ENABLED }}

      # ── Apply plan ─────────────────────────────────────────────────
      - name: Apply plan
        id: apply
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "DRY RUN MODE — no mutations will be made"
          fi

          python -m corev2.cli apply \
            --plan "${{ steps.plan.outputs.plan_file }}" \
            --skip-health-check \
            $DRY_RUN_FLAG \
            2>&1 | tee /tmp/apply.log
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
          MAUTIC_BASE_URL: ${{ secrets.MAUTIC_BASE_URL }}
          MAUTIC_USERNAME: ${{ secrets.MAUTIC_USERNAME }}
          MAUTIC_PASSWORD: ${{ secrets.MAUTIC_PASSWORD }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEAMS_NOTIFICATIONS_ENABLED: ${{ secrets.TEAMS_NOTIFICATIONS_ENABLED }}

      # ── Commit artifacts ───────────────────────────────────────────
      - name: Commit logs and artifacts
        if: always()
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"

          mkdir -p logs
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cp /tmp/plan.log  "logs/plan_${TIMESTAMP}.log"  2>/dev/null || true
          cp /tmp/apply.log "logs/apply_${TIMESTAMP}.log" 2>/dev/null || true

          git add corev2/artifacts/ logs/ 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "Sync run $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push origin HEAD || echo "Nothing to push"

      # ── Upload artifacts on failure ────────────────────────────────
      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-failure-${{ github.run_number }}
          path: |
            /tmp/plan.log
            /tmp/apply.log
            corev2/artifacts/*.json
          retention-days: 14
