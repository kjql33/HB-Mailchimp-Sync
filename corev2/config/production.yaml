# PRODUCTION CONFIGURATION - HubSpot <-> Mautic Sync
# Updated: 2026-04-02
# Reflects full production rule set from PRIMARY_SYNC_RULES.md and SECONDARY_SYNC_RULES.md

hubspot:
  api_key: ${HUBSPOT_PRIVATE_APP_TOKEN}

  lists:
    # GROUP 1: General Marketing
    # Priority: Sanctioned -> Recruitment -> Competition -> Sub Agents -> New Agents -> General
    general_marketing:
      - id: "969"
        name: "Sanctioned"
        tag: "Sanctioned"

      - id: "719"
        name: "Recruitment"
        tag: "Recruitment"

      - id: "720"
        name: "Competition"
        tag: "Competition"

      - id: "989"
        name: "Sub Agents"
        tag: "Sub Agents"

      - id: "945"
        name: "New Agents"
        tag: "New Agents"

      - id: "987"
        name: "General Mailchimp Import"
        tag: "General Single"
        tag_overrides:
          - condition: "branches > 1"
            tag: "General Multi"

    # GROUP 2: Special Campaigns (reserved)
    special_campaigns: []

    # GROUP 3: Manual Override
    # Bypasses active deals (717). Only compliance lists (762, 773) can block.
    manual_override:
      - id: "784"
        name: "Manual Inclusion MC"
        tag: "General Single"
        additional_tags:
          - "Manual Inclusion"
        tag_overrides:
          - condition: "branches > 1"
            tag: "General Multi"

    # GROUP 4: Long Term Marketing
    # Separate journey. Same exclusions as GROUP 1.
    long_term_marketing:
      - id: "1032"
        name: "Long Term Marketing"
        tag: "General Single Long Term"
        tag_overrides:
          - condition: "branches > 1"
            tag: "General Multi Long Term"

  supplemental_tags: []

  exclusions:
    critical:
      - "762"   # Unsubscribed/Opted Out (DYNAMIC - auto-managed by HubSpot)
      - "773"   # Manual Disengagement (DYNAMIC - criteria-based)
    active_deals:
      - "717"   # Active Deals (DYNAMIC - auto-managed by deal pipeline)
    exit: []

# Mautic API configuration (replaces mailchimp section)
mautic:
  base_url: ${MAUTIC_BASE_URL}
  username: ${MAUTIC_USERNAME}
  password: ${MAUTIC_PASSWORD}
  audience_cap: 5000   # Hard limit - sync aborts if reached

sync:
  batch_size: 100
  tag_prefix: ""
  ori_lists_field: "ORI_LISTS"
  force_subscribe: true

# INV-001: Four-group exclusion matrix
exclusion_matrix:
  general_marketing:
    lists: ["969", "719", "720", "989", "945", "987"]
    exclude: ["762", "773", "717"]

  special_campaigns:
    lists: []
    exclude: ["762", "773", "717"]

  manual_override:
    lists: ["784"]
    exclude: ["762", "773"]   # Does NOT include 717 - bypasses active deals

  long_term_marketing:
    lists: ["1032"]
    exclude: ["762", "773", "717"]

list_exclusion_rules: {}

# Secondary sync - 9 exit tag mappings
secondary_sync:
  enabled: true
  archive_after_sync: true
  contact_limit: 0   # UNLIMITED
  exempt_tags:
    - "Manual Inclusion"   # SEC-008: contacts with this tag skipped entirely

  mappings:
    - exit_tag: "General Single Finished"
      destination_list: "946"
      destination_name: "General Handover"
      source_list: "987"
      source_name: "General Mailchimp Import"
      remove_from_source: false   # DYNAMIC list

    - exit_tag: "General Multi Finished"
      destination_list: "946"
      destination_name: "General Handover"
      source_list: "987"
      source_name: "General Mailchimp Import"
      remove_from_source: false   # DYNAMIC list

    - exit_tag: "Recruitment Finished"
      destination_list: "947"
      destination_name: "Recruitment Handover"
      source_list: "719"
      source_name: "Recruitment"
      remove_from_source: true    # MANUAL list

    - exit_tag: "Competition Finished"
      destination_list: "948"
      destination_name: "Competition Handover"
      source_list: "720"
      source_name: "Competition"
      remove_from_source: true    # MANUAL list

    - exit_tag: "Sub Agents Finished"
      destination_list: "1005"
      destination_name: "Sub Agents Handover"
      source_list: "989"
      source_name: "Sub Agents"
      remove_from_source: false   # DYNAMIC list
      additional_remove_lists:
        - list_id: "900"
          list_name: "EXP"
        - list_id: "972"
          list_name: "Keller Williams Agents"
        - list_id: "971"
          list_name: "IAD Agents"

    - exit_tag: "New Agents Finished"
      destination_list: "949"
      destination_name: "New Agents Handover"
      source_list: "945"
      source_name: "New Agents"
      remove_from_source: true    # MANUAL list

    - exit_tag: "Sanctioned Finished"
      destination_list: "1006"
      destination_name: "Sanctioned Handover"
      source_list: "969"
      source_name: "Sanctioned"
      remove_from_source: true    # MANUAL list

    # Long Term - MC cleanup only (no HubSpot destination)
    - exit_tag: "Long Term Single Finished"
      source_list: "1032"
      source_name: "Long Term Marketing"
      remove_from_source: false

    - exit_tag: "Long Term Multi Finished"
      source_list: "1032"
      source_name: "Long Term Marketing"
      remove_from_source: false

archival:
  exempt_tags:
    - "VIP"
    - "DoNotArchive"
    - "Manual_Override"
    - "Manual Inclusion"
  preservation_patterns:
    - "^Manual_.*"
    - "^Custom_.*"
    - "^Team_.*"
  max_archive_per_run: 100

safety:
  test_contact_limit: 0
  run_mode: "prod"
  allow_archive: true
  allow_apply: true
  allow_unlimited: true
  enable_hubspot_writes: false

# Microsoft Teams notifications
notifications:
  enabled: ${TEAMS_NOTIFICATIONS_ENABLED:-false}
  webhook_url: ${TEAMS_WEBHOOK_URL:-}
