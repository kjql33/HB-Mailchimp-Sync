# TEST CONFIGURATION for V2 - Using list 752 (3 contacts)

hubspot:
  api_key: ${HUBSPOT_PRIVATE_APP_TOKEN}
  
  lists:
    general_marketing:
      - id: "752"
        name: "Test List 752"
        tag: "Test752"
    
    special_campaigns: []
    
    manual_override: []
  
  exclusions:
    critical:
      - "762"  # Unsubscribed
      - "773"  # Manual Disengagement
    active_deals: []
    exit: []

mailchimp:
  api_key: ${MAILCHIMP_API_KEY}
  server_prefix: ${MAILCHIMP_DC}
  audience_id: ${MAILCHIMP_LIST_ID}

sync:
  batch_size: 100
  tag_prefix: ""
  ori_lists_field: "ORI_LISTS"
  force_subscribe: true

# INV-001: Three-tier import stream exclusion matrix
exclusion_matrix:
  general_marketing:
    lists: ["752"]
    exclude: ["762", "773"]  # Only compliance lists for test
  
  special_campaigns:
    lists: []
    exclude: ["762", "773"]
  
  manual_override:
    lists: []
    exclude: ["762", "773"]

# INV-009: Anti-remarketing rules (source → destinations to remove from)
list_exclusion_rules: {}

# INV-011: Secondary sync (Mailchimp → HubSpot exit tag routing)
secondary_sync:
  enabled: false
  mappings: []

# INV-006: Smart archival preservation
archival:
  exempt_tags:
    - "VIP"
    - "DoNotArchive"
  preservation_patterns:
    - "^Manual_.*"  # Manual_Something
    - "^Custom_.*"  # Custom_Something

# INV-010: Safety gates (triple-lock for production)
safety:
  test_contact_limit: 3  # Match list 752 (3 contacts)
  run_mode: "test"        # Must be "prod" for production
  allow_archive: false    # Must be true if plan contains archive ops
  allow_apply: false      # Must be true to enable LIVE mutations
  allow_unlimited: false  # Must be true to allow test_contact_limit=0
